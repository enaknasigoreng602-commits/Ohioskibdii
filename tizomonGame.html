<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision - Analis Gambar & Roblox Studio Chat</title>
    <style>
        :root {
            --bg: #06060c;
            --surface: #0e0e1a;
            --surface2: #13132b;
            --border: #1f1f3a;
            --text: #e8e8f4;
            --text2: #a0a0c0;
            --accent: #7c5cfc;
            --accent2: #a78bfa;
            --roblox: #ff4d4d;
            --roblox2: #ff7b7b;
            --gold: #f5b042;
            --danger: #ff4757;
            --success: #2ed573;
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            --radius: 20px;
            --radius-sm: 14px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --glass: rgba(18, 18, 40, 0.7);
            --blur: blur(12px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            background-image:
                radial-gradient(ellipse at 10% 10%, rgba(124, 92, 252, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(255, 77, 77, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(245, 176, 66, 0.04) 0%, transparent 60%);
        }

        .app-container {
            width: 100%;
            max-width: 920px;
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 95vh;
            height: 92vh;
        }

        /* Header */
        .app-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(14, 14, 26, 0.8);
            backdrop-filter: blur(8px);
            flex-shrink: 0;
        }
        .app-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.3px;
        }
        .app-header .logo .icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), #9b8afb);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 0 16px rgba(124, 92, 252, 0.4);
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        .thinking-badge {
            background: rgba(245, 176, 66, 0.12);
            color: var(--gold);
            border: 1px solid rgba(245, 176, 66, 0.3);
            animation: glow-gold 2s ease-in-out infinite;
        }
        .search-badge {
            background: rgba(46, 213, 115, 0.12);
            color: var(--success);
            border: 1px solid rgba(46, 213, 115, 0.3);
            animation: glow-green 2s ease-in-out infinite;
        }
        @keyframes glow-gold {
            0%,
            100% {
                box-shadow: 0 0 8px rgba(245, 176, 66, 0.3);
            }
            50% {
                box-shadow: 0 0 20px rgba(245, 176, 66, 0.6);
            }
        }
        @keyframes glow-green {
            0%,
            100% {
                box-shadow: 0 0 8px rgba(46, 213, 115, 0.3);
            }
            50% {
                box-shadow: 0 0 20px rgba(46, 213, 115, 0.6);
            }
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            animation: bounce-dot 0.8s ease-in-out infinite;
        }
        .dot.gold {
            background: var(--gold);
        }
        .dot.green {
            background: var(--success);
        }
        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes bounce-dot {
            0%,
            100% {
                transform: translateY(0);
                opacity: 1;
            }
            50% {
                transform: translateY(-5px);
                opacity: 0.3;
            }
        }

        /* Model Selector */
        .model-select {
            padding: 7px 12px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: rgba(14, 14, 26, 0.8);
            color: var(--text);
            font-family: inherit;
            font-size: 0.72rem;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            transition: var(--transition);
            backdrop-filter: blur(4px);
        }
        .model-select:hover,
        .model-select:focus {
            border-color: var(--accent2);
            box-shadow: 0 0 12px rgba(124, 92, 252, 0.2);
        }

        /* Mode Tabs */
        .mode-tabs {
            display: flex;
            gap: 3px;
            padding: 4px;
            background: rgba(14, 14, 26, 0.6);
            border-radius: 22px;
            border: 1px solid var(--border);
        }
        .mode-tab {
            padding: 8px 16px;
            border-radius: 18px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            transition: var(--transition);
            background: transparent;
            color: var(--text2);
            white-space: nowrap;
            font-family: inherit;
            letter-spacing: -0.2px;
        }
        .mode-tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 14px rgba(124, 92, 252, 0.5);
        }
        .mode-tab.roblox-active {
            background: var(--roblox);
            color: #fff;
            box-shadow: 0 2px 14px rgba(255, 77, 77, 0.5);
        }
        .mode-tab:hover:not(.active):not(.roblox-active) {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
        }

        /* Body */
        .app-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }
        .app-body::-webkit-scrollbar {
            width: 5px;
        }
        .app-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 28px 18px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: rgba(18, 18, 40, 0.5);
            backdrop-filter: blur(4px);
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            flex-shrink: 0;
        }
        .upload-area:hover,
        .upload-area.drag-over {
            border-color: var(--accent2);
            background: rgba(124, 92, 252, 0.06);
            box-shadow: 0 0 30px rgba(124, 92, 252, 0.1);
        }
        .upload-area.has-image {
            border-style: solid;
            border-color: var(--success);
            padding: 10px;
            min-height: auto;
        }
        .upload-icon {
            font-size: 2.6rem;
            opacity: 0.5;
            transition: var(--transition);
        }
        .upload-area:hover .upload-icon {
            opacity: 0.9;
            transform: translateY(-3px);
        }
        .upload-text {
            font-size: 0.85rem;
            color: var(--text2);
        }
        .upload-hint {
            font-size: 0.7rem;
            color: #555;
        }
        .preview-img {
            max-width: 100%;
            max-height: 240px;
            border-radius: var(--radius-sm);
            object-fit: contain;
            background: #000;
        }
        .remove-img-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--danger);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: var(--transition);
        }
        .remove-img-btn:hover {
            transform: scale(1.2);
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 22px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.82rem;
            transition: var(--transition);
            font-family: inherit;
            letter-spacing: -0.2px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 18px rgba(124, 92, 252, 0.4);
        }
        .btn-primary:hover {
            background: #8b6efc;
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(124, 92, 252, 0.6);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-copy {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 0.72rem;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }
        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            color: #fff;
        }
        .btn-copy.copied {
            background: var(--success);
            border-color: var(--success);
            color: #fff;
        }

        /* Result Card */
        .result-card {
            background: rgba(18, 18, 40, 0.6);
            backdrop-filter: blur(6px);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 16px 18px;
            animation: fadeInUp 0.35s ease;
            flex-shrink: 0;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result-card h3 {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--accent2);
            margin-bottom: 8px;
        }
        .result-content {
            font-size: 0.84rem;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text);
        }

        /* Chat Area */
        .chat-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            min-height: 200px;
        }
        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        .chat-msg {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 0.8rem;
            line-height: 1.55;
            animation: fadeInUp 0.2s ease;
            max-width: 85%;
            word-break: break-word;
        }
        .chat-msg.user {
            background: var(--accent);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 10px rgba(124, 92, 252, 0.3);
        }
        .chat-msg.ai {
            background: rgba(18, 18, 40, 0.7);
            border: 1px solid var(--border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .chat-msg img {
            max-width: 180px;
            max-height: 160px;
            border-radius: 10px;
            margin: 6px 0;
            cursor: pointer;
            border: 2px solid var(--border);
            transition: var(--transition);
        }
        .chat-msg img:hover {
            border-color: var(--accent2);
            transform: scale(1.03);
        }
        .chat-msg .img-label {
            font-size: 0.65rem;
            color: #888;
            margin-top: 3px;
        }
        .chat-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }
        .chat-input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: rgba(14, 14, 26, 0.6);
            color: var(--text);
            font-family: inherit;
            font-size: 0.8rem;
            transition: var(--transition);
            outline: none;
        }
        .chat-input:focus {
            border-color: var(--accent2);
            box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.12);
        }
        .chat-input::placeholder {
            color: #555;
        }
        .attach-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: rgba(14, 14, 26, 0.6);
            color: var(--text2);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .attach-btn:hover {
            border-color: #fff;
            color: #fff;
            background: #222;
        }
        .attach-btn.has-image {
            border-color: var(--success);
            color: var(--success);
            background: rgba(46, 213, 115, 0.1);
        }
        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(124, 92, 252, 0.4);
        }
        .send-btn:hover {
            background: #8b6efc;
            transform: scale(1.05);
        }
        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .chat-preview-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(18, 18, 40, 0.6);
            border-radius: 16px;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        .chat-preview-bar img {
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
        }
        .chat-preview-bar .preview-name {
            flex: 1;
            font-size: 0.7rem;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-preview-bar .preview-remove {
            cursor: pointer;
            color: var(--danger);
            font-weight: bold;
            font-size: 0.9rem;
            padding: 2px 6px;
        }

        /* Status */
        .status-bar {
            text-align: center;
            font-size: 0.7rem;
            color: #777;
            min-height: 16px;
            flex-shrink: 0;
        }
        .status-bar.loading {
            color: var(--gold);
        }
        .status-bar.error {
            color: var(--danger);
        }

        /* Code block */
        .code-block-wrapper {
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            overflow: hidden;
            background: #08081a;
        }
        .code-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border);
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .code-block {
            padding: 10px 14px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.73rem;
            line-height: 1.45;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            color: #c8d6e5;
            max-height: 350px;
            overflow-y: auto;
        }
        .code-block::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .code-block::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 4px;
        }

        .empty-chat {
            text-align: center;
            color: #555;
            padding: 30px;
            font-size: 0.82rem;
        }

        @media (max-width: 600px) {
            .app-header {
                padding: 10px 12px;
                gap: 6px;
            }
            .app-header .logo {
                font-size: 0.9rem;
            }
            .mode-tab {
                padding: 6px 10px;
                font-size: 0.68rem;
            }
            .model-select {
                font-size: 0.65rem;
                padding: 5px 8px;
            }
            .app-body {
                padding: 10px;
            }
            .chat-msg {
                max-width: 92%;
                font-size: 0.74rem;
            }
            .chat-msg img {
                max-width: 130px;
                max-height: 110px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <div class="app-header">
            <div class="logo">
                <div class="icon">✨</div>
                <span>AI Vision Studio</span>
            </div>
            <div class="header-right">
                <div class="badge thinking-badge" id="thinkingBadge">
                    <span>Thinking</span>
                    <span class="dot gold"></span>
                    <span class="dot gold"></span>
                    <span class="dot gold"></span>
                </div>
                <div class="badge search-badge" id="searchBadge">
                    <span>Searching</span>
                    <span class="dot green"></span>
                </div>
                <select class="model-select" id="modelSelect">
                    <option value="openai/gpt-4o">🧠 GPT-4o</option>
                    <option value="google/gemini-2.0-flash-001">⚡ Gemini 2.0 Flash</option>
                    <option value="meta-llama/llama-3.2-90b-vision-instruct">🦙 Llama 3.2 90B</option>
                    <option value="qwen/qwen-2-vl-72b-instruct">🌐 Qwen 2 VL 72B</option>
                </select>
                <div class="mode-tabs" id="modeTabs">
                    <button class="mode-tab active" data-mode="normal" id="tabNormal">🧠 Analis Gambar</button>
                    <button class="mode-tab" data-mode="roblox" id="tabRoblox">🎮 Roblox Studio</button>
                </div>
            </div>
        </div>

        <!-- Body -->
        <div class="app-body" id="appBody"></div>
    </div>

    <script>
        (function() {
            // === CONFIG ===
            const API_KEY = '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';
            const API_URL = 'https://openrouter.ai/api/v1/chat/completions';

            const MODEL_OPTIONS = {
                'openai/gpt-4o': { name: 'GPT-4o', provider: 'OpenAI' },
                'google/gemini-2.0-flash-001': { name: 'Gemini 2.0 Flash', provider: 'Google' },
                'meta-llama/llama-3.2-90b-vision-instruct': { name: 'Llama 3.2 90B Vision',
                provider: 'Meta' },
                'qwen/qwen-2-vl-72b-instruct': { name: 'Qwen 2 VL 72B', provider: 'Qwen' },
            };

            // === DOM REFS ===
            const appBody = document.getElementById('appBody');
            const modeTabs = document.getElementById('modeTabs');
            const tabNormal = document.getElementById('tabNormal');
            const tabRoblox = document.getElementById('tabRoblox');
            const thinkingBadge = document.getElementById('thinkingBadge');
            const searchBadge = document.getElementById('searchBadge');
            const modelSelect = document.getElementById('modelSelect');

            // === STATE ===
            let currentMode = 'normal';
            let isProcessing = false;
            let currentModel = modelSelect.value;

            // Normal mode state
            let normalImageBase64 = null;
            let normalImageMimeType = null;
            let normalChatHistory = [];
            // Roblox mode state
            let robloxChatHistory = [];
            let robloxPendingImage = null;
            let robloxPendingImagePreview = null;

            // === INIT ===
            setBadgesActive(false);
            renderModeContent();
            updateModeTabsUI();

            modelSelect.addEventListener('change', () => {
                currentModel = modelSelect.value;
            });

            // === MODE SWITCHING ===
            modeTabs.addEventListener('click', (e) => {
                const tab = e.target.closest('.mode-tab');
                if (!tab) return;
                if (isProcessing) {
                    alert('Tunggu proses selesai sebelum pindah mode.');
                    return;
                }
                currentMode = tab.dataset.mode;
                updateModeTabsUI();
                renderModeContent();
            });

            function updateModeTabsUI() {
                [tabNormal, tabRoblox].forEach(t => {
                    t.classList.remove('active', 'roblox-active');
                });
                if (currentMode === 'roblox') {
                    tabRoblox.classList.add('roblox-active');
                } else {
                    tabNormal.classList.add('active');
                }
            }

            function setBadgesActive(active) {
                const dots = thinkingBadge.querySelectorAll('.dot.gold');
                const searchDot = searchBadge.querySelector('.dot.green');
                dots.forEach(d => d.style.display = active ? 'inline-block' : 'none');
                if (searchDot) searchDot.style.display = active ? 'inline-block' : 'none';
                thinkingBadge.style.opacity = active ? '1' : '0.5';
                searchBadge.style.opacity = active ? '1' : '0.5';
            }

            function showStatus(msg, type) {
                const sb = document.getElementById('statusBar') || document.getElementById('robloxStatusBar');
                if (!sb) return;
                sb.textContent = msg;
                sb.className = 'status-bar';
                if (type === 'loading') sb.classList.add('loading');
                if (type === 'error') sb.classList.add('error');
            }

            // === RENDER ===
            function renderModeContent() {
                appBody.innerHTML = '';
                if (currentMode === 'normal') renderNormalMode();
                else renderRobloxMode();
            }

            // ============ NORMAL MODE ============
            function renderNormalMode() {
                appBody.innerHTML = `
              <div class="upload-area" id="uploadArea">
                <span class="upload-icon">🖼️</span>
                <span class="upload-text"><strong>Klik atau Seret Gambar ke Sini</strong></span>
                <span class="upload-hint">PNG, JPG, WEBP, GIF (Maks ~15MB)</span>
                <input type="file" id="fileInput" accept="image/*" style="display:none;">
                <button class="remove-img-btn" id="removeImgBtn" style="display:none;">✕</button>
                <img id="previewImg" class="preview-img" style="display:none;">
              </div>
              <button class="btn btn-primary" id="analyzeBtn" disabled>✨ Analisis Gambar</button>
              <div class="status-bar" id="statusBar"></div>
              <div id="resultsContainer"></div>
            `;
                bindNormalEvents();
                restoreNormalState();
            }

            function bindNormalEvents() {
                const ua = document.getElementById('uploadArea');
                const fi = document.getElementById('fileInput');
                const rm = document.getElementById('removeImgBtn');
                const ab = document.getElementById('analyzeBtn');
                ua.addEventListener('click', e => { if (e.target !== rm) fi.click(); });
                fi.addEventListener('change', e => { if (e.target.files[0]) processNormalFile(e.target.files[
                        0]); });
                ua.addEventListener('dragover', e => { e.preventDefault();
                    ua.classList.add('drag-over'); });
                ua.addEventListener('dragleave', () => ua.classList.remove('drag-over'));
                ua.addEventListener('drop', e => {
                    e.preventDefault();
                    ua.classList.remove('drag-over');
                    const f = e.dataTransfer.files[0];
                    if (f && f.type.startsWith('image/')) processNormalFile(f);
                });
                rm.addEventListener('click', e => { e.stopPropagation();
                    resetNormalImage(); });
                ab.addEventListener('click', startNormalAnalysis);
            }

            function restoreNormalState() {
                if (normalImageBase64 && normalImageMimeType) {
                    const pi = document.getElementById('previewImg');
                    const ua = document.getElementById('uploadArea');
                    const rm = document.getElementById('removeImgBtn');
                    const ab = document.getElementById('analyzeBtn');
                    pi.src = `data:${normalImageMimeType};base64,${normalImageBase64}`;
                    pi.style.display = 'block';
                    ua.classList.add('has-image');
                    rm.style.display = 'flex';
                    ua.querySelector('.upload-icon').style.display = 'none';
                    ua.querySelector('.upload-text').innerHTML = '<strong>✓ Gambar Siap</strong>';
                    ua.querySelector('.upload-hint').textContent = 'Klik "Analisis Gambar"';
                    ab.disabled = false;
                }
                if (normalChatHistory.length > 0) renderNormalResults();
            }

            function processNormalFile(file) {
                if (!file.type.startsWith('image/')) { showStatus('❌ Harap pilih gambar.', 'error'); return; }
                if (file.size > 15 * 1024 * 1024) { showStatus('❌ Maks 15MB.', 'error'); return; }
                normalImageMimeType = file.type;
                const reader = new FileReader();
                reader.onload = ev => {
                    normalImageBase64 = ev.target.result.split(',')[1];
                    const pi = document.getElementById('previewImg');
                    const ua = document.getElementById('uploadArea');
                    const rm = document.getElementById('removeImgBtn');
                    const ab = document.getElementById('analyzeBtn');
                    pi.src = ev.target.result;
                    pi.style.display = 'block';
                    ua.classList.add('has-image');
                    rm.style.display = 'flex';
                    ua.querySelector('.upload-icon').style.display = 'none';
                    ua.querySelector('.upload-text').innerHTML = '<strong>✓ Gambar Siap</strong>';
                    ua.querySelector('.upload-hint').textContent =
                        `${file.type.split('/')[1].toUpperCase()} | ${(file.size/1024).toFixed(1)} KB`;
                    ab.disabled = false;
                    document.getElementById('statusBar').textContent = '';
                };
                reader.readAsDataURL(file);
            }

            function resetNormalImage() {
                normalImageBase64 = null;
                normalImageMimeType = null;
                normalChatHistory = [];
                ['previewImg', 'uploadArea', 'removeImgBtn', 'analyzeBtn', 'resultsContainer', 'fileInput',
                    'statusBar'
                ].forEach(id => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    if (id === 'previewImg') el.style.display = 'none';
                    if (id === 'uploadArea') {
                        el.classList.remove('has-image');
                        el.querySelector('.upload-icon').style.display = '';
                        el.querySelector('.upload-text').innerHTML =
                        '<strong>Klik atau Seret Gambar ke Sini</strong>';
                        el.querySelector('.upload-hint').textContent = 'PNG, JPG, WEBP, GIF (Maks ~15MB)';
                    }
                    if (id === 'removeImgBtn') el.style.display = 'none';
                    if (id === 'analyzeBtn') el.disabled = true;
                    if (id === 'resultsContainer') el.innerHTML = '';
                    if (id === 'fileInput') el.value = '';
                    if (id === 'statusBar') el.textContent = '';
                });
            }

            async function startNormalAnalysis() {
                if (!normalImageBase64 || isProcessing) return;
                isProcessing = true;
                document.getElementById('analyzeBtn').disabled = true;
                document.getElementById('resultsContainer').innerHTML = '';
                normalChatHistory = [];
                showStatus('🔍 Menganalisis...', 'loading');
                setBadgesActive(true);

                const systemPrompt = `Kamu AI analis gambar handal. Analisis gambar dengan detail dalam Bahasa Indonesia.`;
                const userPrompt = 'Tolong analisis gambar ini secara detail dan lengkap.';

                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${API_KEY}`,
                            'HTTP-Referer': window.location.href,
                            'X-Title': 'AI Vision',
                        },
                        body: JSON.stringify({
                            model: currentModel,
                            messages: [
                                { role: 'system', content: systemPrompt },
                                { role: 'user', content: [
                                        { type: 'text', text: userPrompt },
                                        { type: 'image_url', image_url: { url: `data:${normalImageMimeType || 'image/png'};base64,${normalImageBase64}`,
                                                detail: 'high' } }
                                    ] }
                            ],
                            max_tokens: 2500,
                            temperature: 0.7,
                        }),
                    });
                    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error?.message || 'HTTP Error');
                    const data = await res.json();
                    const txt = data.choices?.[0]?.message?.content || 'Tidak ada respons.';
                    normalChatHistory = [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: [{ type: 'text', text: userPrompt }, { type: 'image_url',
                                image_url: { url: `data:${normalImageMimeType || 'image/png'};base64,${normalImageBase64}`,
                                    detail: 'high' } }] },
                        { role: 'assistant', content: txt }
                    ];
                    renderNormalResults();
                    showStatus('✅ Selesai.', '');
                } catch (e) {
                    showStatus(`❌ ${e.message}`, 'error');
                } finally {
                    isProcessing = false;
                    setBadgesActive(false);
                    document.getElementById('analyzeBtn').disabled = false;
                }
            }

            function renderNormalResults() {
                const container = document.getElementById('resultsContainer');
                if (!container) return;
                const last = normalChatHistory.filter(m => m.role === 'assistant').pop();
                container.innerHTML = `
              <div class="result-card">
                <h3>🧠 Hasil Analisis</h3>
                <div class="result-content">${renderMarkdown(last?.content || '')}</div>
              </div>
              <div class="result-card" style="margin-top:6px;">
                <h3>💬 Tanya Lanjutan</h3>
                <div class="chat-area" id="normalChatArea"></div>
                <div class="chat-input-row" style="margin-top:6px;">
                  <input class="chat-input" id="normalChatInput" placeholder="Tanyakan tentang gambar...">
                  <button class="send-btn" id="normalChatSend">➤</button>
                </div>
              </div>
            `;
                const ca = document.getElementById('normalChatArea');
                const ci = document.getElementById('normalChatInput');
                const cs = document.getElementById('normalChatSend');
                const send = () => {
                    const q = ci.value.trim();
                    if (!q || isProcessing) return;
                    ci.value = '';
                    appendMsg(ca, 'user', q);
                    const lm = appendMsg(ca, 'ai', '<em style="color:#888;">Berpikir...</em>');
                    sendNormalFollowUp(q, ca, lm);
                };
                cs.addEventListener('click', send);
                ci.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
            }

            async function sendNormalFollowUp(q, chatArea, loadMsg) {
                setBadgesActive(true);
                try {
                    const msgs = [...normalChatHistory, { role: 'user', content: q }];
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${API_KEY}`,
                            'HTTP-Referer': window.location.href,
                            'X-Title': 'AI Vision',
                        },
                        body: JSON.stringify({ model: currentModel, messages: msgs, max_tokens: 2000,
                            temperature: 0.7 }),
                    });
                    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error?.message || 'HTTP Error');
                    const data = await res.json();
                    const reply = data.choices?.[0]?.message?.content || '';
                    normalChatHistory.push({ role: 'user', content: q }, { role: 'assistant', content: reply });
                    if (loadMsg.parentNode) loadMsg.remove();
                    appendMsg(chatArea, 'ai', renderMarkdown(reply));
                } catch (e) {
                    if (loadMsg.parentNode) loadMsg.remove();
                    appendMsg(chatArea, 'ai', '❌ ' + e.message);
                } finally { setBadgesActive(false); }
            }

            function appendMsg(container, role, content) {
                const div = document.createElement('div');
                div.className = `chat-msg ${role}`;
                div.innerHTML = content;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
                return div;
            }

            // ============ ROBLOX MODE ============
            function renderRobloxMode() {
                appBody.innerHTML = `
              <div class="chat-area" id="robloxChatArea">
                <div class="empty-chat" id="robloxEmptyChat">🎮 <strong>Roblox Studio Chat</strong><br><small>Kirim gambar & tanya scripting/building</small></div>
              </div>
              <div class="chat-preview-bar" id="robloxPreviewBar" style="display:none;">
                <img id="robloxPreviewImg"><span class="preview-name" id="robloxPreviewName"></span>
                <span class="preview-remove" id="robloxPreviewRemove">✕</span>
              </div>
              <div class="chat-input-row">
                <button class="attach-btn" id="robloxAttachBtn">📎</button>
                <input class="chat-input" id="robloxChatInput" placeholder="Tanyakan Roblox Studio...">
                <button class="send-btn" id="robloxChatSend" disabled>➤</button>
              </div>
              <input type="file" id="robloxFileInput" accept="image/*" style="display:none;">
              <div class="status-bar" id="robloxStatusBar"></div>
            `;
                bindRobloxEvents();
                restoreRobloxState();
            }

            function bindRobloxEvents() {
                const ca = document.getElementById('robloxChatArea');
                const ci = document.getElementById('robloxChatInput');
                const cs = document.getElementById('robloxChatSend');
                const ab = document.getElementById('robloxAttachBtn');
                const fi = document.getElementById('robloxFileInput');
                const pb = document.getElementById('robloxPreviewBar');
                const pr = document.getElementById('robloxPreviewRemove');

                ci.addEventListener('input', () => cs.disabled = !ci.value.trim() && !robloxPendingImage);
                ci.addEventListener('keydown', e => { if (e.key === 'Enter' && !cs.disabled) sendRoblox(); });
                cs.addEventListener('click', sendRoblox);
                ab.addEventListener('click', () => fi.click());
                fi.addEventListener('change', e => { if (e.target.files[0]) processRobloxFile(e.target.files[0]); });
                pr.addEventListener('click', () => {
                    robloxPendingImage = null;
                    robloxPendingImagePreview = null;
                    pb.style.display = 'none';
                    ab.classList.remove('has-image');
                    cs.disabled = !ci.value.trim();
                    fi.value = '';
                });
                ca.addEventListener('dragover', e => e.preventDefault());
                ca.addEventListener('drop', e => {
                    e.preventDefault();
                    const f = e.dataTransfer.files[0];
                    if (f && f.type.startsWith('image/')) processRobloxFile(f);
                });
            }

            function restoreRobloxState() {
                if (robloxChatHistory.length > 0) {
                    document.getElementById('robloxEmptyChat').style.display = 'none';
                    const ca = document.getElementById('robloxChatArea');
                    robloxChatHistory.forEach(m => { if (m.role === 'user' || m.role === 'assistant')
                        renderRobloxMsg(ca, m); });
                    ca.scrollTop = ca.scrollHeight;
                }
            }

            function processRobloxFile(file) {
                if (!file.type.startsWith('image/')) { showStatus('❌ Hanya gambar.', 'error'); return; }
                if (file.size > 15 * 1024 * 1024) { showStatus('❌ Maks 15MB.', 'error'); return; }
                const reader = new FileReader();
                reader.onload = ev => {
                    robloxPendingImage = { base64: ev.target.result.split(',')[1], mimeType: file.type };
                    robloxPendingImagePreview = ev.target.result;
                    document.getElementById('robloxPreviewImg').src = ev.target.result;
                    document.getElementById('robloxPreviewName').textContent = file.name;
                    document.getElementById('robloxPreviewBar').style.display = 'flex';
                    document.getElementById('robloxAttachBtn').classList.add('has-image');
                    document.getElementById('robloxChatSend').disabled = false;
                };
                reader.readAsDataURL(file);
            }

            async function sendRoblox() {
                if (isProcessing) return;
                const ci = document.getElementById('robloxChatInput');
                const text = ci.value.trim();
                const img = robloxPendingImage;
                if (!text && !img) return;
                isProcessing = true;
                const cs = document.getElementById('robloxChatSend');
                cs.disabled = true;
                ci.value = '';
                const sentImg = img;
                const sentPrev = robloxPendingImagePreview;
                robloxPendingImage = null;
                robloxPendingImagePreview = null;
                document.getElementById('robloxPreviewBar').style.display = 'none';
                document.getElementById('robloxAttachBtn').classList.remove('has-image');
                document.getElementById('robloxFileInput').value = '';
                document.getElementById('robloxEmptyChat').style.display = 'none';

                let userDisp = '';
                if (sentPrev) userDisp +=
                    `<img src="${sentPrev}" onclick="window._openImg('${sentPrev}')"><br><span class="img-label">📷 Gambar</span>`;
                if (text) userDisp += (userDisp ? '<br>' : '') + escapeHTML(text);
                const ca = document.getElementById('robloxChatArea');
                renderRobloxMsg(ca, { role: 'user', content: userDisp });

                const sys = `Kamu AI ahli Roblox Studio & scripting Lua. Beri jawaban detail dalam Bahasa Indonesia. Jika user kirim gambar, analisis & beri panduan + kode Lua. Bungkus kode dalam \`\`\`lua ... \`\`\`.`;
                const msgs = [{ role: 'system', content: sys }];
                robloxChatHistory.forEach(m => { if (m.role !== 'system') msgs.push({ role: m.role,
                        content: m.apiContent || m.content }); });
                const newApi = [];
                if (sentImg) newApi.push({ type: 'image_url', image_url: { url: `data:${sentImg.mimeType};base64,${sentImg.base64}`,
                        detail: 'high' } });
                if (text) newApi.push({ type: 'text', text: text });
                else if (sentImg) newApi.push({ type: 'text',
                    text: 'Analisis gambar ini dalam konteks Roblox Studio, berikan panduan dan kode Lua.' });
                msgs.push({ role: 'user', content: newApi });

                const lm = renderRobloxMsg(ca, { role: 'ai',
                content: '<em style="color:#888;">🎮 Menganalisis & mencari solusi...</em>' });
                setBadgesActive(true);
                showStatus('🔍 Searching & Thinking...', 'loading');
                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${API_KEY}`,
                            'HTTP-Referer': window.location.href,
                            'X-Title': 'Roblox Studio',
                        },
                        body: JSON.stringify({ model: currentModel, messages: msgs, max_tokens: 3000,
                            temperature: 0.7 }),
                    });
                    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error?.message || 'HTTP Error');
                    const data = await res.json();
                    const reply = data.choices?.[0]?.message?.content || '';
                    robloxChatHistory.push({ role: 'user', content: userDisp, apiContent: newApi }, { role: 'assistant',
                        content: reply, apiContent: reply });
                    if (lm.parentNode) lm.remove();
                    renderRobloxMsg(ca, { role: 'ai', content: renderMarkdownWithCopy(reply) });
                    showStatus('✅', '');
                } catch (e) {
                    if (lm.parentNode) lm.remove();
                    renderRobloxMsg(ca, { role: 'ai', content: '❌ ' + escapeHTML(e.message) });
                    showStatus('❌ ' + e.message, 'error');
                } finally {
                    isProcessing = false;
                    setBadgesActive(false);
                    cs.disabled = false;
                }
            }

            function renderRobloxMsg(container, msg) {
                const div = document.createElement('div');
                div.className = `chat-msg ${msg.role}`;
                div.innerHTML = msg.content;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
                return div;
            }

            // === MARKDOWN RENDERING WITH COPY BUTTONS ===
            function renderMarkdown(text) {
                if (!text) return '';
                // Escape HTML first, then handle code blocks and other formatting
                let html = escapeHTML(text);
                // Code blocks with copy button
                html = html.replace(/```(\w*)\s*([\s\S]*?)```/g, (match, lang, code) => {
                    const escapedCode = escapeHTML(code.trim());
                    const langLabel = lang || 'code';
                    const uniqueId = 'code-' + Math.random().toString(36).substr(2, 8);
                    return `
                <div class="code-block-wrapper">
                  <div class="code-block-header">
                    <span>💻 ${langLabel.toUpperCase()}</span>
                    <button class="btn-copy" onclick="window._copyCode(this, '${uniqueId}')">📋 Salin</button>
                  </div>
                  <div class="code-block" id="${uniqueId}">${escapedCode}</div>
                </div>`;
                });
                // Bold, italic, headings, lists
                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
                html = html.replace(/^### (.+)$/gm, '<h4 style="margin:8px 0 4px;color:#c8c8d0;">$1</h4>');
                html = html.replace(/^## (.+)$/gm, '<h3 style="margin:10px 0 5px;color:#d0d0d8;">$1</h3>');
                html = html.replace(/^# (.+)$/gm, '<h2 style="margin:12px 0 6px;color:#d8d8e0;">$1</h2>');
                html = html.replace(/^- (.+)$/gm, '<li style="margin-left:14px;">$1</li>');
                html = html.replace(/^(\d+)\. (.+)$/gm, '<li style="margin-left:14px;">$2</li>');
                html = html.replace(/\n/g, '<br>');
                return html;
            }

            function renderMarkdownWithCopy(text) {
                // Same as renderMarkdown but keeps code blocks interactive
                return renderMarkdown(text);
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // Global copy function
            window._copyCode = function(btn, codeId) {
                const codeEl = document.getElementById(codeId);
                const code = codeEl ? codeEl.textContent : '';
                navigator.clipboard.writeText(code).then(() => {
                    btn.textContent = '✅ Tersalin!';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = '📋 Salin';
                        btn.classList.remove('copied');
                    }, 2000);
                }).catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = code;
                    ta.style.position = 'fixed';
                    ta.style.opacity = '0';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    btn.textContent = '✅ Tersalin!';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = '📋 Salin';
                        btn.classList.remove('copied');
                    }, 2000);
                });
            };

            window._openImg = function(src) {
                const win = window.open('', '_blank', 'width=800,height=600');
                if (win) {
                    win.document.write(
                        `<img src="${src}" style="max-width:100%;max-height:100vh;display:block;margin:auto;">`);
                    win.document.title = 'Preview';
                }
            };

            // === INIT ===
            updateModeTabsUI();
            renderModeContent();
            setBadgesActive(false);
            console.log('✅ AI Vision Studio siap');
            console.log('   🧠 Mode Normal: Upload gambar → Analisis + tanya jawab');
            console.log('   🎮 Mode Roblox: Chat + kirim gambar → Panduan & kode Lua + salin');
            console.log('   🔥 Thinking & Searching indikator AKTIF');
            console.log('   ❌ Claude dihapus dari daftar model');
        })();
    </script>
</body>
